<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found on Stackly.">
  <title>Page Not Found — Stackly</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/404.css">
  <link rel="icon" type="image/webp" href="assets/logo.webp">
</head>
<body class="error-body">
  <!-- ======== PRELOADER ======== -->
  <div id="preloader">
    <img src="assets/logo.webp" alt="Stackly Logo">
  </div>

  <div class="error-container">
    <div class="error-visuals">
      <div class="glow-bg"></div>
      <h1 class="error-code">404!</h1>
      <div class="error-text">
        <h2>Oops! Page Not Found</h2>
        <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
          <button onclick="history.back()" class="btn-primary" style="border: none; cursor: pointer;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Go Back
          </button>
          <a href="index.html" class="btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;">
              <line x1="19" y1="12" x2="5" y2="12"></line>
              <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
</html>
